<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Fitness Gear Shop</title>
    <style>
        /* 프리젠테이션 레이아웃 기본 스타일링 규격 정의 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 40px 20px;
            color: #212529;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        hr {
            border: 0;
            height: 1px;
            background: #dee2e6;
            margin-bottom: 40px;
        }
        /* 다중 스레드 데이터 진열용 그리드(Grid) 아키텍처 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.06);
        }
        .product-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 4px;
        }
        .product-stock {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 20px;
        }
        .btn-order {
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-order:hover {
            background-color: #0d6efd;
        }
        /* 통신 단절 및 재고 고갈 런타임 에러 팝업 컨테이너 */
        .error-message {
            grid-column: 1 / -1;
            background-color: #fff5f5;
            border: 1px solid #ffe3e3;
            color: #e53e3e;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏋️‍♂️ Premium Fitness Gear Shop</h1>
    <hr>
    
    <div id="product-container" class="product-grid">
        <p style="text-align: center; grid-column: 1 / -1;">백엔드 코어 서버로부터 데이터를 안전하게 수신하는 중입니다...</p>
    </div>
</div>

<script>
    // 1. [DOM 트리 완비 이벤트 리스너 작동] 웹 브라우저가 화면 구조 해석을 완료하는 순간 비동기 통신 가동
    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("product-container");

        // 2. [인바운드 상품 스캔 fetch 알고리즘 실행] 백엔드 내장 톰캣의 상품 리스트 API 호출
        fetch('http://localhost:8080/api/products')
            .then(response => {
                // 3. [전송 계층 상태 코드 유효성 검증 분기] 통신이 거부(404, 500 등)되면 즉시 에러 트랙으로 예외를 전파합니다.
                if (!response.ok) throw new Error(`HTTP 통신 에러 모델 핸들링 대상 (상태코드: ${response.status})`);
                return response.json();
            })
            .then(products => {
                container.innerHTML = ""; // 대기 안내 문구 메모리 클리어

                // 4. [데이터 무결성 폴백 검증] 가용 자원이 전혀 없을 경우 경고 메시지 돔(DOM) 빌딩
                if (products.length === 0) {
                    container.innerHTML = `<div class="error-message">데이터베이스 내 진열된 상품 자원이 존재하지 않습니다.</div>`;
                    return;
                }

                // 5. [의존성 순환 데이터 반복 렌더링 파이프라인] 백엔드 DTO 배열을 토대로 개별 상품 카드를 동적 빌딩합니다.
                products.forEach(product => {
                    const card = document.createElement("div");
                    card.className = "product-card";
                    card.innerHTML = `
                        <div class="product-name">📦 ${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()}원</div>
                        <div class="product-stock">남은 수량: ${product.stockQuantity}개</div>
                        <button class="btn-order" onclick="processOrder(${product.id})">바로 주문하기</button>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error("비동기 API 페치 실패:", error);
                container.innerHTML = `
                    <div class="error-message">
                        ⚠️ 백엔드 쇼핑몰 코어 엔진 통신 실패 (Failed to fetch)<br>
                        <span style="font-size: 0.85rem; font-weight: 400; color: #718096; display: block; margin-top: 8px;">
                            [원인 조치] 1. 패키지 경로 수정한 파일을 저장했는지 확인하십시오.<br>
                            2. 터미널(demo 폴더)에서 자바 17 서버 환경이 가동 중(Port: 8080)인지 점검하십시오.
                        </span>
                    </div>
                `;
            });
    });

    /**
     * [아웃바운드 주문 트랜잭션 요청 비동기 통신 알고리즘 - 핵심 리팩토링 구간]
     * 화면의 버튼을 누르면 백엔드 OrderController의 @PostMapping 엔드포인트로 JSON 주문 데이터를 밀어 넣습니다.
     * * @param productId 사용자가 선택하여 주문하고자 하는 상품 고유 식별 주키 (DB 외래키 맵핑 대상 타겟)
     */
    function processOrder(productId) {
        // [시연 흐름용 하드코딩 사양 수립] 학부생 시연 정합성을 위해 1번 회원 객체(이현준)가 항상 1개씩 주문하도록 명세를 제어합니다.
        const orderRequestData = {
            userId: 1, 
            productId: productId,
            count: 1
        };

        // 1. [비동기 데이터 포스팅 파이프라인 가동] 백엔드 주문 처리 진입점 게이트웨이 호출
        fetch('http://localhost:8080/api/orders', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // 자바 Spring의 @RequestBody 인식을 유도하는 MIME 타입 스펙 명시
            },
            body: JSON.stringify(orderRequestData) // 자바스크립트 리터럴 객체를 원시 JSON 문자열 토큰으로 직렬화 변환
        })
        .then(response => {
            // 2. [비관적 락 및 예외 분기 추론 알고리즘] 
            // 백엔드에서 200 OK가 아닌 400 Bad Request(재고 부족 등) 등이 유반되면 response.text() 분석을 위해 분기합니다.
            return response.text().then(text => {
                if (!response.ok) {
                    // 예외 발생 시 에러 사유 문구를 담아 비동기 예외 트랙(.catch)으로 강제 이관시킵니다.
                    throw new Error(text);
                }
                return text; // 성공 시 백엔드가 생성해 준 주문 완료 문자열 메시지 리턴
            });
        })
        .then(successMessage => {
            // 3. [트랜잭션 최종 성공 렌더링] 영속성 컨텍스트 반영 및 비관적 락 정상 해제 시 알림창 출력 후 새로고침
            alert(successMessage);
            window.location.reload(); // 차감 완료된 잔여 재고 수량을 진열대에 새로 동기화하기 위한 새로고침 알고리즘 작동
        })
        .catch(errorMessage => {
            // 4. [비즈니스 결격 사유 경고 처리] 백엔드 GlobalExceptionHandler가 던진 "상품의 재고가 부족합니다." 문구를 그대로 팝업합니다.
            alert(errorMessage.message);
        });
    }
</script>
</body>
</html>
